interface:
  display_name: "Yao GEOFlow Template"
  short_description: "Map reference-site styles onto GEOFlow frontend modules and generate preview-first template package plans"
  default_prompt: "Use $yao-geoflow-template to inventory the current GEOFlow frontend contract, map a reference site's style onto GEOFlow modules, and produce a preview-first template package plan without changing business logic."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
